name: Publish Solar Potential Frontend Image

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Fortress deploy environment
        required: true
        default: prod
        type: choice
        options:
          - prod
      dispatch_fortress:
        description: Dispatch fortress after publishing the image
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: solar-potential-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: ghcr.io/benlagrone/solar-potential-frontend
      SOURCE_SHA: ${{ github.sha }}
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_environment || 'prod' }}
      SHOULD_DISPATCH_RAW: ${{ github.event_name == 'workflow_dispatch' && inputs.dispatch_fortress || 'true' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/benlagrone/solar-potential-frontend:sha-${{ github.sha }}
            ghcr.io/benlagrone/solar-potential-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispatch Fortress Deploy
        shell: bash
        env:
          FORTRESS_REPO_DISPATCH_TOKEN: ${{ secrets.FORTRESS_REPO_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          SHOULD_DISPATCH="$(printf '%s' "${SHOULD_DISPATCH_RAW}" | tr '[:upper:]' '[:lower:]')"
          if [ "${SHOULD_DISPATCH}" != "true" ]; then
            echo "Fortress dispatch disabled for this run."
            exit 0
          fi

          if [ -z "${FORTRESS_REPO_DISPATCH_TOKEN:-}" ]; then
            echo "FORTRESS_REPO_DISPATCH_TOKEN is not configured; skipping fortress dispatch."
            exit 0
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${FORTRESS_REPO_DISPATCH_TOKEN}" \
            https://api.github.com/repos/benlagrone/fortress-phronesis/dispatches \
            -d @- <<EOF
          {
            "event_type": "deploy-solar-potential-frontend",
            "client_payload": {
              "source_sha": "${SOURCE_SHA}",
              "environment": "${DEPLOY_ENVIRONMENT}"
            }
          }
          EOF

      - name: Workflow Summary
        shell: bash
        run: |
          {
            echo "## Solar Potential Frontend Publish"
            echo ""
            echo "- Source SHA: \`${SOURCE_SHA}\`"
            echo "- Image tags: \`${IMAGE_REF}:sha-${SOURCE_SHA}\`, \`${IMAGE_REF}:latest\`"
            echo "- Fortress environment: \`${DEPLOY_ENVIRONMENT}\`"
            echo "- Fortress dispatch requested: \`${SHOULD_DISPATCH_RAW}\`"
          } >> "$GITHUB_STEP_SUMMARY"

name: Publish Solar Potential Frontend Image

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Fortress deploy environment
        required: true
        default: prod
        type: choice
        options:
          - prod
      dispatch_fortress:
        description: Dispatch fortress after publishing the image
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: solar-potential-frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_REF: ghcr.io/benlagrone/solar-potential-frontend
      SOURCE_SHA: ${{ github.sha }}
      DEPLOY_ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_environment || 'prod' }}
      SHOULD_DISPATCH_RAW: ${{ github.event_name == 'workflow_dispatch' && inputs.dispatch_fortress || 'true' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log In To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/benlagrone/solar-potential-frontend:sha-${{ github.sha }}
            ghcr.io/benlagrone/solar-potential-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Dispatch Fortress Deploy
        id: dispatch_fortress
        shell: bash
        env:
          FORTRESS_REPO_DISPATCH_TOKEN: ${{ secrets.FORTRESS_REPO_DISPATCH_TOKEN }}
          FORTRESS_WORKFLOW_TOKEN: ${{ secrets.FORTRESS_WORKFLOW_TOKEN }}
          FORTRESS_REPO: benlagrone/fortress-phronesis
          FORTRESS_WORKFLOW_FILE: deploy-solar-potential-frontend.yml
        run: |
          set -euo pipefail

          SHOULD_DISPATCH="$(printf '%s' "${SHOULD_DISPATCH_RAW}" | tr '[:upper:]' '[:lower:]')"
          if [ "${SHOULD_DISPATCH}" != "true" ]; then
            {
              echo "dispatch_requested=false"
              echo "dispatch_method=disabled"
            } >> "$GITHUB_OUTPUT"
            echo "Fortress dispatch disabled for this run."
            exit 0
          fi

          echo "dispatch_requested=true" >> "$GITHUB_OUTPUT"

          if [ -n "${FORTRESS_REPO_DISPATCH_TOKEN:-}" ]; then
            payload="$(printf '{"event_type":"deploy-solar-potential-frontend","client_payload":{"source_sha":"%s","environment":"%s"}}' "${SOURCE_SHA}" "${DEPLOY_ENVIRONMENT}")"
            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${FORTRESS_REPO_DISPATCH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${FORTRESS_REPO}/dispatches" \
              -d "${payload}"
            echo "dispatch_method=repository_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${FORTRESS_WORKFLOW_TOKEN:-}" ]; then
            payload="$(printf '{"ref":"main","inputs":{"source_sha":"%s","environment":"%s"}}' "${SOURCE_SHA}" "${DEPLOY_ENVIRONMENT}")"
            curl -fsSL \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${FORTRESS_WORKFLOW_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${FORTRESS_REPO}/actions/workflows/${FORTRESS_WORKFLOW_FILE}/dispatches" \
              -d "${payload}"
            echo "dispatch_method=workflow_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Missing fortress dispatch token. Configure FORTRESS_REPO_DISPATCH_TOKEN or FORTRESS_WORKFLOW_TOKEN." >&2
          exit 1

      - name: Workflow Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Solar Potential Frontend Publish"
            echo ""
            echo "- Source SHA: \`${SOURCE_SHA}\`"
            echo "- Image tags: \`${IMAGE_REF}:sha-${SOURCE_SHA}\`, \`${IMAGE_REF}:latest\`"
            echo "- Fortress environment: \`${DEPLOY_ENVIRONMENT}\`"
            echo "- Fortress dispatch requested: \`${SHOULD_DISPATCH_RAW}\`"
            echo "- Fortress dispatch outcome: \`${{ steps.dispatch_fortress.outcome }}\`"
            echo "- Fortress dispatch method: \`${{ steps.dispatch_fortress.outputs.dispatch_method }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
